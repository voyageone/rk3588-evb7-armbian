name: Build Armbian for RK3588 EVB7

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Kernel branch'
        required: false
        default: 'vendor'
        type: choice
        options:
          - vendor
          - current
          - edge
      release:
        description: 'Ubuntu/Debian release'
        required: false
        default: 'noble'
        type: choice
        options:
          - noble
          - bookworm
          - trixie
          - jammy
      ui:
        description: 'Image type'
        required: false
        default: 'minimal'
        type: choice
        options:
          - minimal
          - server
          - xfce

jobs:
  build:
    name: Build RK3588 EVB7 Image
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Build Armbian
        uses: armbian/build@main
        with:
          armbian_token: ${{ secrets.GITHUB_TOKEN }}
          armbian_board: "rk3588-evb7"
          armbian_target: "build"
          armbian_release: "${{ inputs.release || 'noble' }}"
          armbian_kernel_branch: "${{ inputs.kernel_branch || 'vendor' }}"
          armbian_ui: "${{ inputs.ui || 'minimal' }}"
          armbian_compress: "sha,img,xz"
          armbian_runner_clean: "yes"
          armbian_release_title: "Armbian RK3588 EVB7"
          armbian_release_body: |
            ## Rockchip RK3588 EVB7 LP4 V10

            **Board:** RK3588 EVB7
            **Kernel:** ${{ inputs.kernel_branch || 'vendor' }}
            **Release:** ${{ inputs.release || 'noble' }}
            **UI:** ${{ inputs.ui || 'minimal' }}

            Built with [Armbian Build Framework](https://github.com/armbian/build)
